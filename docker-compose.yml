services:
  postgres:
    image: postgres:16-alpine
    container_name: flt-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: garden
      POSTGRES_PASSWORD: garden
      POSTGRES_DB: garden
    ports:
      - "5432:5432"
    volumes:
      - flt_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U garden -d garden"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  flt_pg_data:
