<!DOCTYPE html>
<html lang="ru">
<head>
  <meta name="api-url" content="https://flt-eg0r6.amvera.io">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Мой Садик 🌱</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="sky" aria-hidden="true">
    <div class="cloud cloud-1"></div>
    <div class="cloud cloud-2"></div>
    <div class="cloud cloud-3"></div>
    <div class="sun"></div>
    <div class="hills"></div>
    <div class="ad-plane" id="ad-plane" hidden>
      <svg class="ad-plane__scene" viewBox="0 0 300 80" aria-hidden="true">
        <defs>
          <linearGradient id="pl-fuse" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#ffffff"/>
            <stop offset="100%" stop-color="#e8e8e8"/>
          </linearGradient>
        </defs>

        <!-- плакат -->
        <g class="ad-plane__banner-wrap">
          <rect x="120" y="27" width="168" height="26" rx="2" fill="#fff" stroke="#dee2e6" stroke-width="1"/>
          <text class="ad-plane__text" x="204" y="43" text-anchor="middle">Здесь могла бы быть ваша реклама</text>
        </g>

        <!-- тросы -->
        <line x1="108" y1="35" x2="120" y2="31" stroke="#495057" stroke-width="1.3" stroke-linecap="round"/>
        <line x1="108" y1="39" x2="120" y2="49" stroke="#495057" stroke-width="1.3" stroke-linecap="round"/>

        <!-- самолёт (спереди, нос влево) -->
        <g class="ad-plane__body">
          <ellipse cx="14" cy="40" rx="2.5" ry="13" fill="#ced4da" opacity="0.5"/>
          <path d="M20 44 C20 36 28 32 52 31 L88 33 C102 34 110 37 110 40 C110 43 102 46 88 47 L52 49 C28 48 20 44 20 44Z" fill="url(#pl-fuse)" stroke="#868e96" stroke-width="1.2"/>
          <path d="M36 31 L82 28 L84 32 L38 35 Z" fill="#fff" stroke="#adb5bd" stroke-width="1"/>
          <path d="M44 33 L68 31" stroke="#74c0fc" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
          <path d="M90 36 L112 32 L112 38 L90 42 Z" fill="#f1f3f5" stroke="#868e96" stroke-width="1"/>
          <path d="M92 32 L100 18 L104 32 Z" fill="#f1f3f5" stroke="#868e96" stroke-width="1"/>
          <path d="M34 44 L92 42" stroke="#4dabf7" stroke-width="1.8" opacity="0.55"/>
          <circle cx="17" cy="40" r="2.5" fill="#495057"/>
        </g>
      </svg>
    </div>
  </div>

  <div id="app">
    <header class="header">
      <div class="logo">
        <span class="logo-emoji">🌻</span>
        <div>
          <h1>Мой Садик</h1>
          <span class="tag" id="mode">…</span>
        </div>
      </div>
      <div class="coin-pill" id="coins">
        <span class="coin" aria-hidden="true"></span>
        <span class="coin-num">0</span>
      </div>
    </header>

    <main id="main">
      <div class="loader" id="loader">
        <div class="loader-plant">🌱</div>
        <p>Садик просыпается…</p>
      </div>
    </main>

    <nav class="tabbar" id="tabbar" hidden>
      <button class="tabbar__btn tabbar__btn--active" data-tab="garden" type="button">
        <span class="tabbar__icon">🏡</span>
        <span class="tabbar__label">Сад</span>
      </button>
      <button class="tabbar__btn" data-tab="plot" type="button">
        <span class="tabbar__icon">🌱</span>
        <span class="tabbar__label">Грядка</span>
      </button>
      <button class="tabbar__btn" data-tab="friends" type="button">
        <span class="tabbar__icon">👥</span>
        <span class="tabbar__label">Друзья</span>
      </button>
      <button class="tabbar__btn" data-tab="shop" type="button">
        <span class="tabbar__icon">⚡</span>
        <span class="tabbar__label">Улучш.</span>
      </button>
      <button class="tabbar__btn" data-tab="profile" type="button">
        <span class="tabbar__icon">👤</span>
        <span class="tabbar__label">Профиль</span>
      </button>
    </nav>
  </div>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="app.js"></script>
</body>
</html>
